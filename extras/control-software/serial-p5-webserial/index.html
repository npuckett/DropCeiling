<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DropCeiling Serial Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="webserial.js"></script>
    <script src="sketch.js"></script>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111;
        background: #f6f7f9;
      }
      body {
        margin: 0;
        padding: 24px;
      }
      main {
        max-width: 680px;
        margin: 0 auto;
      }
      button {
        min-height: 34px;
        padding: 0 12px;
      }
      input[type="range"] {
        width: 100%;
      }
      .panel {
        background: #fff;
        border: 1px solid #d7dce2;
        border-radius: 8px;
        padding: 16px;
      }
      .row {
        display: grid;
        grid-template-columns: 56px 1fr 44px;
        gap: 12px;
        align-items: center;
        margin: 10px 0;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 12px 0 18px;
      }
      .status {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
  </body>
</html>
